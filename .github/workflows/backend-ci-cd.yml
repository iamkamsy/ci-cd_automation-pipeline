name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          TESTING: "true"
          SECRET_KEY: "ci-test-secret"
          MONGO_URI: "mongodb://localhost:27017"
        run: python -m pytest

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: test
    # Only run this job on push to main when AZURE_WEBAPP_NAME is configured.
    # vars context is available in job-level if expressions.
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.AZURE_WEBAPP_NAME != ''
    env:
      # Mapped to env so the deploy step can guard with env.PUBLISH_PROFILE != ''.
      # Secrets cannot be compared directly in if expressions.
      PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        # Skip cleanly if the publish profile secret has not been configured.
        if: env.PUBLISH_PROFILE != ''
        uses: azure/webapps-deploy@v3
        with:
          # AZURE_WEBAPP_NAME must match the Terraform app_service_name variable.
          # Set this as a repository variable (Settings → Variables → Actions).
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.PUBLISH_PROFILE }}
          package: ./backend
