name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}
      # Secret name for Flask SECRET_KEY is FLASK_SECRET_KEY in GitHub Secrets.
      # It must match the value used by the backend (app.py reads SECRET_KEY at runtime).
      TF_VAR_secret_key: ${{ secrets.FLASK_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false
